<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสั่งซื้อเสื้อ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .hidden { display: none; }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        input, button { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        .form-group { text-align: left; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="homePage">
            <h2>ยินดีต้อนรับ</h2>
            <button id="btnGoRegister">ลงทะเบียน</button>
            <button id="btnGoLogin">ล็อกอิน</button>
        </div>

        <div id="registerPage" class="hidden">
            <h2>ลงทะเบียน</h2>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="อีเมล (จำเป็น)">
                <input type="text" id="regFirstName" placeholder="ชื่อ (จำเป็น)">
                <input type="text" id="regLastName" placeholder="นามสกุล (จำเป็น)">
                <input type="text" id="regOrg" placeholder="หน่วยงาน">
                <input type="text" id="regPhone" placeholder="เบอร์โทรศัพท์">
                <input type="text" id="regAddress" placeholder="ที่อยู่">
            </div>
            <button id="btnSubmitRegister">ยืนยันลงทะเบียน</button>
            <button class="btnBack">กลับหน้าแรก</button>
        </div>

        <div id="loginPage" class="hidden">
            <h2>ล็อกอินเข้าสู่ระบบ</h2>
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="กรอกอีเมลที่ลงทะเบียนไว้">
            </div>
            <button id="btnSubmitLogin">เข้าสู่ระบบ</button>
            <button class="btnBack">กลับหน้าแรก</button>
        </div>

        <div id="dashboardPage" class="hidden">
            <h2 id="welcomeText">ยินดีต้อนรับคุณ...</h2>
            <p>คุณสามารถสั่งซื้อเสื้อได้ที่นี่</p>
            <button id="btnLogout">ออกจากระบบ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
