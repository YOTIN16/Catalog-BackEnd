<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reward Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #FAFAFA;
            --surface:     #FFFFFF;
            --surface2:    #F4F4F5;
            --border:      #E4E4E7;
            --text-main:   #18181B;
            --text-muted:  #71717A;
            --accent:      #0F172A;
            --gold:        #D4AF37;
            --gold-light:  #FDFBF7;
            
          
            --success:     #10B981; 
            --success-hover:#059669;
            --warning:     #F59E0B; 
            --warning-hover:#D97706;
            --danger:      #EF4444; 
            --danger-hover:#DC2626;
            
            --radius:      24px;
            --radius-sm:   14px;
            --shadow-sm:   0 2px 8px rgba(0, 0, 0, 0.02);
            --shadow-md:   0 8px 30px rgba(0, 0, 0, 0.04);
            --transition:  all 0.3s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        nav {
            position: sticky; top: 0; z-index: 200;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            height: 72px;
            display: flex; align-items: center;
            padding: 0 clamp(1.5rem, 5vw, 4rem);
            justify-content: space-between;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600; font-size: 1.4rem; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--accent);
            display: flex; align-items: center; gap: 10px;
        }
        .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }

        .tab-group { display: flex; background: var(--surface2); border-radius: 99px; padding: 4px; gap: 4px; }
        .tab-btn {
            font-family: 'Sarabun', sans-serif; font-weight: 500; font-size: 0.9rem;
            padding: 8px 24px; border-radius: 99px; border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; transition: var(--transition);
        }
        .tab-btn.active-role { background: var(--surface); color: var(--accent); box-shadow: var(--shadow-sm); }

        main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .hidden-section { display: none !important; }

        .card { background: var(--surface); border-radius: var(--radius); padding: 2rem; box-shadow: var(--shadow-md); border: 1px solid rgba(0,0,0,0.05); }
        .panel-label { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.25rem; color: var(--accent); margin-bottom: 1.5rem; }

        .search-row { display: flex; gap: 12px; }
        .search-row input { flex: 1; background: var(--surface2); border: 2px solid transparent; border-radius: var(--radius-sm); padding: 14px 18px; font-size: 1rem; outline: none; transition: var(--transition); }
        .search-row input:focus { background: var(--surface); border-color: var(--gold); }

        /* ---------------- ปุ่มสีต่างๆ ---------------- */
        .btn {
            font-family: 'Sarabun', sans-serif; font-weight: 500; font-size: 0.95rem;
            padding: 12px 24px; border-radius: var(--radius-sm); border: none; cursor: pointer;
            transition: var(--transition); color: #fff;
        }
        .btn-dark { background: var(--accent); }
        .btn-dark:hover { background: #1E293B; transform: translateY(-2px); }
        
        .btn-green { background: var(--success); }
        .btn-green:hover { background: var(--success-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        
        .btn-yellow { background: var(--warning); }
        .btn-yellow:hover { background: var(--warning-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2); }
        
        .btn-red { background: var(--danger); }
        .btn-red:hover { background: var(--danger-hover); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--surface2); }
        
        /* ปุ่มขนาดเล็กในตาราง */
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }

        #section-customer { display: grid; grid-template-columns: 1fr; gap: 2.5rem; }
        @media (min-width: 1024px) { #section-customer { grid-template-columns: 380px 1fr; } }

        #customer-result { margin-top: 1.5rem; background: var(--gold-light); border-radius: var(--radius-sm); padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(212, 175, 55, 0.2); }
        #customer-result.hidden { display: none; }
        .c-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; }
        #c-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.4rem; color: var(--accent); }
        #c-points { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 2.5rem; color: var(--gold); line-height: 1; }

        #reward-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
        .reward-card { background: var(--surface); border-radius: var(--radius-sm); padding: 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 1rem; transition: var(--transition); }
        .reward-card:hover { border-color: rgba(212, 175, 55, 0.3); transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }

        #section-manager .card { margin-bottom: 2rem; }
        .mgr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.85rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        td { padding: 16px 12px; font-size: 0.95rem; border-bottom: 1px solid var(--surface2); }
        tbody tr:hover { background: var(--surface2); }

        .modal-backdrop { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-backdrop.open { opacity: 1; pointer-events: all; }
        .modal-box { background: var(--surface); border-radius: var(--radius); padding: 2.5rem; width: 100%; max-width: 440px; transform: scale(0.95); opacity: 0; transition: all 0.3s ease; }
        .modal-backdrop.open .modal-box { transform: scale(1); opacity: 1; }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.5rem; color: var(--accent); margin-bottom: 1.5rem; text-align: center; }
        
        .modal-fields { display: flex; flex-direction: column; gap: 16px; margin-bottom: 2rem; }
        .modal-fields input { background: var(--surface2); border: 1px solid transparent; border-radius: var(--radius-sm); padding: 14px; font-size: 1rem; outline: none; width: 100%; }
        .modal-fields input:focus { border-color: var(--gold); background: var(--surface); }
        .modal-actions { display: flex; gap: 12px; }
        .modal-actions .btn { flex: 1; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><div class="logo-dot"></div>Reward Center</div>
        <div class="tab-group">
            <button id="btn-customer" class="tab-btn active-role" onclick="switchRole('customer')">มุมลูกค้า</button>
            <button id="btn-manager"  class="tab-btn"             onclick="switchRole('manager')">ผู้จัดการ</button>
        </div>
    </nav>

    <main>
        <section id="section-customer">
            <div>
                <div class="card">
                    <div class="panel-label">ค้นหาสมาชิก</div>
                    <div class="search-row">
                        <input type="text" id="search-phone" placeholder="เบอร์โทรศัพท์…" maxlength="10">
                        <button class="btn btn-dark" onclick="searchByPhone()">ค้นหา</button>
                    </div>
                    <div id="customer-result" class="hidden">
                        <div><p class="c-label">สมาชิก</p><p id="c-name">—</p></div>
                        <div class="points-badge"><p class="c-label">แต้มคงเหลือ</p><p id="c-points">0</p></div>
                    </div>
                </div>
            </div>

            <div>
                <div class="panel-label">ของรางวัลทั้งหมด</div>
                <div id="reward-list-container">
                    </div>
            </div>
        </section>

        <section id="section-manager" class="hidden-section">
            <div class="card">
                <div class="mgr-header">
                    <div class="panel-label" style="margin-bottom:0;">รายชื่อลูกค้า</div>
                    <button class="btn btn-green" onclick="openAddCustomerModal()">+ เพิ่มลูกค้าใหม่</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th>ชื่อ-นามสกุล</th><th>เบอร์โทรศัพท์</th><th style="text-align:center">คะแนนสะสม</th><th style="text-align:center">จัดการ</th></tr>
                        </thead>
                        <tbody id="manager-customer-table"></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="mgr-header">
                    <div class="panel-label" style="margin-bottom:0;">คลังของรางวัล</div>
                    <button class="btn btn-green" onclick="openAddRewardModal()">+ เพิ่มรางวัลใหม่</button>
                </div>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr><th style="text-align:center">ID</th><th>ชื่อของรางวัล</th><th style="text-align:center">แต้มที่ใช้</th><th style="text-align:center">จัดการ</th></tr>
                        </thead>
                        <tbody id="manager-reward-table"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="customer-modal" class="modal-backdrop">
        <div class="modal-box">
            <div class="modal-title" id="cust-modal-title">ข้อมูลลูกค้า</div>
            <div class="modal-fields">
                <input type="hidden" id="edit-customer-id">
                <input type="text"   id="in-cust-name"   placeholder="ชื่อ-นามสกุล">
                <input type="text"   id="in-cust-phone"  placeholder="เบอร์โทรศัพท์" maxlength="10">
                <input type="number" id="in-cust-points" placeholder="กำหนดคะแนน">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('customer-modal')">ยกเลิก</button>
                <button class="btn btn-green"   onclick="saveCustomer()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <div id="reward-modal" class="modal-backdrop">
        <div class="modal-box">
            <div class="modal-title" id="reward-modal-title">ข้อมูลของรางวัล</div>
            <div class="modal-fields">
                <input type="hidden" id="modal-reward-id">
                <input type="text"   id="in-reward-name"   placeholder="ชื่อของรางวัล">
                <input type="number" id="in-reward-points" placeholder="แต้มที่ต้องใช้">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('reward-modal')">ยกเลิก</button>
                <button class="btn btn-green"   onclick="saveReward()">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.display = 'flex';
            requestAnimationFrame(() => el.classList.add('open'));
        }
        function closeModal(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove('open');
            setTimeout(() => { if (!el.classList.contains('open')) el.style.display = 'none'; }, 300);
        }
    </script>
    <script src="pos.js"></script>
</body>
</html>
